<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Your Workspace</title>
</head>
<body style="margin: 0; padding: 0; background-color: #030303; font-family: 'Courier New', Courier, monospace; color: #FFFFFF;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="table-layout: fixed;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #0a0a0a; border: 1px solid #333333; box-shadow: 0px 10px 30px rgba(0,0,0,0.5);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 40px 20px 40px;">
                            <div style="display: inline-block; padding: 10px; border: 1px solid #2563EB; background-color: #0a0a0a; border-radius: 4px;">
                                <span style="font-weight: 900; color: #FFFFFF; letter-spacing: 2px;">TASKMASTER_PRO</span>
                            </div>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding: 20px 40px 40px 40px; text-align: center;">
                            <h1 style="font-size: 28px; font-weight: 900; margin: 0 0 20px 0; color: #FFFFFF; letter-spacing: -1px;">INITIATE HANDSHAKE</h1>
                            
                            <p style="font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.5); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;">
                                Operator authorization required to activate the secure workflow unit.
                            </p>
                            
                            <!-- Button -->
                            <table border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
                                <tr>
                                    <td align="center" bgcolor="#FFFFFF" style="padding: 15px 30px;">
                                        <a href="{{ .ConfirmationURL }}" style="color: #000000; text-decoration: none; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; display: inline-block;">
                                            Confirm Identity
                                        </a>
                                    </td>
                                </tr>
                            </table>

                            <p style="font-size: 11px; margin-top: 40px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.5px;">
                                // System: Workspace Initialization protocol v2.0
                            </p>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 20px; border-top: 1px solid #1a1a1a; background-color: #050505;">
                            <p style="font-size: 10px; margin: 0; color: rgba(255,255,255,0.2); letter-spacing: 1px; text-transform: uppercase;">
                                &copy; 2026 TASKMASTER_PRO. Status: Nominal.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
